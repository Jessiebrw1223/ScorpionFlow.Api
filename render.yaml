services:
  - type: web
    name: scorpionflow-api
    env: dotnet
    plan: free
    rootDir: backend/ScorpionFlow.Api/ScorpionFlow.API
    buildCommand: dotnet restore && dotnet publish -c Release -o out
    startCommand: dotnet out/ScorpionFlow.API.dll
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:$PORT
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__Secret
        sync: false
      - key: Cors__AllowedOrigins__0
        sync: false
      - key: Frontend__Url
        sync: false
      - key: Api__Url
        sync: false
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false
